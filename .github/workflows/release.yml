name: Release

# Cut a GitHub release whenever a version tag is pushed (e.g. `git tag v0.2.4 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for `gh release create` to write the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need every tag + commit so we can diff against the previous tag

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the extension package
        run: pnpm run package

      - name: Build changelog from the previous tag
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # The tag immediately preceding this one, if any (walks first-parent history).
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
            echo "Changelog range: ${RANGE}"
          else
            RANGE="${TAG}"
            echo "No previous tag found; listing all commits up to ${TAG}"
          fi

          # One line per commit: short hash prefix + subject.
          LOG="$(git log --no-merges --pretty=format:'- %h %s' "$RANGE")"

          {
            echo "body<<EOF"
            echo "## Changes"
            echo
            if [ -n "$PREV" ]; then
              echo "Commits since \`${PREV}\`:"
            else
              echo "All commits:"
            fi
            echo
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$BODY" \
            artifacts/*.xpi
