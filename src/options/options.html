<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Anchor PDF Reader — Options</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    sans-serif;
            }
            body {
                margin: 0;
                padding: 2rem;
                max-width: 40rem;
                line-height: 1.5;
            }
            h1 {
                font-size: 1.3rem;
                margin: 0 0 0.25rem;
            }
            p.sub {
                margin: 0 0 1.5rem;
                opacity: 0.7;
            }
            .field {
                margin-bottom: 1.5rem;
            }
            label {
                font-weight: 600;
                display: block;
                margin-bottom: 0.35rem;
            }
            .hint {
                font-size: 0.85rem;
                opacity: 0.7;
                margin-top: 0.25rem;
            }
            input[type="text"],
            input[type="email"] {
                width: 100%;
                padding: 0.5rem;
                font-size: 1rem;
                box-sizing: border-box;
            }
            .checkbox-row {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .checkbox-row label {
                margin: 0;
            }
            #status {
                min-height: 1.25rem;
                font-size: 0.9rem;
                color: #2e7d32;
            }
        </style>
    </head>
    <body>
        <h1>Anchor PDF Reader</h1>
        <p class="sub">Settings for citation previews.</p>

        <div class="field">
            <label for="mailto">Polite-pool contact email</label>
            <input type="email" id="mailto" name="mailto" autocomplete="off" />
            <p class="hint">
                Sent to OpenAlex and Crossref so your requests use their faster
                "polite pool". Not shared anywhere else.
            </p>
        </div>

        <div class="field">
            <div class="checkbox-row">
                <input type="checkbox" id="hoverPreview" name="hoverPreview" />
                <label for="hoverPreview">Open preview cards on hover</label>
            </div>
            <p class="hint">
                When off, previews open only when you click a citation. When on,
                they also open after briefly hovering a citation marker.
            </p>
        </div>

        <div id="status" role="status" aria-live="polite"></div>

        <script src="options.js" type="module"></script>
    </body>
</html>
